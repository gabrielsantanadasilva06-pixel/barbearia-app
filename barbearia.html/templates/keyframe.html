<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <center>
        <a href="http://www.coracao.com.br">
            <div class="pulsar"></div>
        </a>
    </center>
<style>
    .pulsar {
        width: 100px;
        height: 100px;
        background-image: url('coracao.webp');
        min-height: 100vh;
        min-width: 100vh;
        background-repeat: no-repeat;
        animation: pulso 1s infinite;
        margin-top: 200px;
    }
    @keyframes pulso {
        0%, 100% {
            transform: scale(1.0);
            opacity: 1;
        }
        50% {
            transform: scale(1.1);
            opacity: 0.6;
        }
    }
</style>
